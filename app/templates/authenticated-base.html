<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout App</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Theme -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">

    {% block external_js %}{% endblock %}
</head>

<body>

    <!-- Background Images -->
<div class="bg-images">
    <img src="{{ url_for('static', path='img/fit1.jpg') }}">
    <img src="{{ url_for('static', path='img/fit2.jpg') }}">
    <img src="{{ url_for('static', path='img/fit3.jpg') }}">
</div>

<!-- Vertical Text -->
<div class="vertical-text vertical-left">
    DISCIPLINE OVER MOTIVATION
</div>

<div class="vertical-text vertical-right">
    DISCIPLINE OVER MOTIVATION
</div>

    <!-- Navbar -->
    <nav class="navbar px-4 py-3 d-flex justify-content-between">
        <span class="navbar-brand text-white fw-bold">Workout App</span>

        <div>
            <a href="/app" class="btn btn-dark me-2">Workouts</a>
            <a href="/routine" class="btn btn-dark me-2">My Routine</a>
            <a href="/logout" class="btn btn-dark">Logout</a>
        </div>
    </nav>

    {% block subpage_content %}{% endblock %}

</body>
</html>
