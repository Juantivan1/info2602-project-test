<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- KEEP TITLE -->
    <title>Workout App</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- ✅ FIXED CSS PATH -->
    <link rel="stylesheet" href="/static/css/style.css">

    {% block external_js %}{% endblock %}
</head>

<body>

<!-- BACKGROUND IMAGES (UNCHANGED) -->
<div class="bg-images">
    <img src="/static/img/fit1.jpg">
    <img src="/static/img/fit2.jpg">
    <img src="/static/img/fit3.jpg">
</div>

<!-- VERTICAL TEXT -->
<div class="vertical-text vertical-left">
    DISCIPLINE OVER MOTIVATION
</div>

<div class="vertical-text vertical-right">
    DISCIPLINE OVER MOTIVATION
</div>

<!-- ✅ NAVBAR (FIXED, SIMPLE, WORKING) -->
<nav class="navbar px-4 py-3 d-flex justify-content-between align-items-center position-relative">

    <!-- LEFT -->
    <div class="d-flex gap-2">
        {% block header_left %}{% endblock %}
    </div>

    <!-- CENTER TITLE -->
    <div style="
        position:absolute;
        left:50%;
        transform:translateX(-50%);
        color:white;
        font-weight:600;
        font-size:22px;
    ">
        {% block header_title %}{% endblock %}
    </div>

    <!-- RIGHT -->
    <div class="d-flex gap-2 ms-auto">
        {% block header_right %}{% endblock %}
    </div>

</nav>

{% block subpage_content %}{% endblock %}

</body>
</html>
