{% extends "base.html" %}

{% block content %}

<style>
  body {
    background-color: #d9d9d9;
    font-family: serif;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
  }

  .circle {
    width: 80px;
    height: 80px;
    background: #bbb;
    border-radius: 50%;
  }

  .title {
    font-size: 40px;
    font-weight: bold;
  }

  .divider {
    border-top: 1px solid black;
  }

  .login-box {
    width: 400px;
    margin: 80px auto;
    background: #cfcfcf;
    padding: 40px;
    text-align: center;
  }

  input {
    width: 80%;
    padding: 10px;
    margin: 15px 0;
  }

  .btn {
    background: black;
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
  }

  .btn:hover {
    opacity: 0.8;
  }
</style>

<div class="header">
  <div class="circle"></div>
  <div class="title">My Workout Mixer</div>
  <div class="circle"></div>
</div>

<div class="divider"></div>

<div class="login-box">
  <h2>Register</h2>

  <form method="post" action="/register">
    <input type="text" name="username" placeholder="Username"><br>
    <!-- al -->
    <input type="email" name="email" placeholder="Email" required><br>
    <input type="password" name="password" placeholder="Password"><br>

    <button class="btn" type="submit">Register</button>
  </form>

</div>
{% endblock %}
