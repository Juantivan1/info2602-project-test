<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/favicon.ico')}}">
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Usual bootstrap css, bootstrap js, jquery and material symbols -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,100,1,200"
        rel="stylesheet" />
    <!-- Custom css and js global for the app-->
    <link href="{{ url_for('static', path='css/app.css')}}" rel="stylesheet">

    <!-- Custom css for the page -->
    {% block external_css %}{% endblock %}

    <!-- page specific internal css-->
    {% block internal_css %}{% endblock %}
</head>

<body>
    <body>

<!-- 🔥 GLOBAL LAYOUT (SAFE WRAPPER) -->
<div class="main-layout">

    <!-- LEFT IMAGES -->
 <!-- <div class="side-images left">
   #     <img src="{{ url_for('static', path='img/img1.jpg') }}">
    #    <img src="{{ url_for('static', path='img/img2.jpg') }}">
    </div>  --> 

    <!-- EXISTING PAGE CONTENT (UNCHANGED) -->
    <div class="center-content">
        {% block content %}{% endblock %}
    </div>

    <!-- RIGHT IMAGES -->
    <!-- <div class="side-images right">
        <img src="{{ url_for('static', path='img/img3.jpg') }}">
        <img src="{{ url_for('static', path='img/img4.jpg') }}">
    </div> -->

</div>
    <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="2000">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastContent">
                
            </div>
        </div>
    </div>

    {% block external_js %}{% endblock %}
</body>

</html>
